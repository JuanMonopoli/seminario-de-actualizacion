<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Ejercicio 1</title>
</head>

<body>

<saludo-persona></saludo-persona>

<script>

class SaludoPersona extends HTMLElement
{
    connectedCallback()
    {
        this.nombre = document.createElement("input");

        this.apellido = document.createElement("input");

        this.boton = document.createElement("button");

        this.resultado = document.createElement("p");

        this.boton.textContent = "Saludar";

        this.appendChild(document.createTextNode("Nombre: "));
        this.appendChild(this.nombre);

        this.appendChild(document.createElement("br"));

        this.appendChild(document.createTextNode("Apellido: "));
        this.appendChild(this.apellido);

        this.appendChild(document.createElement("br"));
        this.appendChild(document.createElement("br"));

        this.appendChild(this.boton);

        this.appendChild(this.resultado);

        this.boton.onclick = this.saludar.bind(this);
    }

    saludar()
    {
        let nombre =
        this.nombre.value.toLowerCase();

        nombre =
        nombre.charAt(0).toUpperCase() +
        nombre.slice(1);

        let apellido =
        this.apellido.value.toUpperCase();

        this.resultado.textContent =
        "¡Buenos días " +
        apellido +
        ", " +
        nombre +
        "!";
    }
}

customElements.define(
    "saludo-persona",
    SaludoPersona
);

</script>

</body>

</html>
