<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Graphic EQ</title>

    <style>

        body{
            background:#c0c0c0;
            font-family:Tahoma;
            margin:0;
            padding:20px;
        }

        .equalizer{
            width:760px;
            background:#d4d0c8;
            border:2px solid #808080;
            padding:10px;
            margin:auto;
        }

        .header{
            font-weight:bold;
            margin-bottom:15px;
        }

        .content{
            display:flex;
            justify-content:space-between;
        }

        .bars{
            display:flex;
            gap:6px;
        }

        .band{
            width:60px;
            height:240px;

            border:1px solid gray;
            background:#efefef;

            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:space-between;

            padding:5px;
        }

        .freq{
            font-size:12px;
        }

        .value{
            font-size:12px;
        }

        .slider-container{
            height:150px;

            display:flex;
            align-items:center;
            justify-content:center;
        }

        input[type=range]{
            width:150px;
            height:20px;

            transform:rotate(-90deg);
        }

        .buttons{
            display:flex;
            flex-direction:column;
            gap:10px;
            margin-left:20px;
        }

        button{
            width:90px;
            padding:6px;
            background:#d4d0c8;
            border:1px solid black;
            cursor:pointer;
        }

    </style>

</head>

<body>

</body>

<script>

class Equalizer extends HTMLElement
{
    constructor()
    {
        super();

        this.data = {

            "32Hz":0,
            "64Hz":0,
            "130Hz":0,
            "260Hz":0,
            "500Hz":0,
            "1k":0,
            "2k":0,
            "4k":0,
            "8k":0,
            "16k":0

        };

        this.container = document.createElement('div');

        this.container.className = 'equalizer';

        this.header = document.createElement('div');

        this.header.className = 'header';

        this.header.innerText = 'Graphic EQ';

        this.content = document.createElement('div');

        this.content.className = 'content';

        this.bars = document.createElement('div');

        this.bars.className = 'bars';

        this.buttons = document.createElement('div');

        this.buttons.className = 'buttons';

        let texts = ['OK', 'Cancel', 'Audition', 'Help'];

        texts.forEach(t => {

            let btn = document.createElement('button');

            btn.innerText = t;

            this.buttons.appendChild(btn);

        });

        this.content.appendChild(this.bars);

        this.content.appendChild(this.buttons);

        this.container.appendChild(this.header);

        this.container.appendChild(this.content);

        this.appendChild(this.container);

        this.render();
    }

    render()
    {
        this.bars.innerHTML = "";

        for(let freq in this.data)
        {
            let band = document.createElement('div');

            band.className = 'band';

            let freqLabel = document.createElement('div');

            freqLabel.className = 'freq';

            freqLabel.innerText = freq;

            let sliderContainer = document.createElement('div');

            sliderContainer.className = 'slider-container';

            let slider = document.createElement('input');

            slider.type = 'range';

            slider.min = -10;

            slider.max = 10;

            slider.value = this.data[freq];

            let value = document.createElement('div');

            value.className = 'value';

            value.innerText = slider.value + ' dB';

            slider.addEventListener('input', () => {

                this.data[freq] = parseInt(slider.value);

                value.innerText = slider.value + ' dB';

            });

            sliderContainer.appendChild(slider);

            band.appendChild(freqLabel);

            band.appendChild(sliderContainer);

            band.appendChild(value);

            this.bars.appendChild(band);
        }
    }

    getData()
    {
        return this.data;
    }

    setData(newData)
    {
        for(let key in newData)
        {
            if(this.data.hasOwnProperty(key))
            {
                this.data[key] = newData[key];
            }
        }

        this.render();
    }

    connectedCallback()
    {
        console.log('Equalizer agregado al DOM');
    }

    disconnectedCallback()
    {
        console.log('Equalizer eliminado del DOM');
    }
}

customElements.define('x-equalizer', Equalizer);

// MAIN
window.onload = () => {

    let eq = new Equalizer();

    document.body.appendChild(eq);

    // DEMO
    setTimeout(() => {

        eq.setData({

            "32Hz":5,
            "64Hz":8,
            "130Hz":-4,
            "260Hz":2,
            "500Hz":10,
            "1k":-3,
            "2k":4,
            "4k":-8,
            "8k":6,
            "16k":1

        });

    }, 2000);

};

</script>

</html>
