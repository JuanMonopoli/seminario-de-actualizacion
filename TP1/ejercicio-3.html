<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Ecualizador WebComponent</title>

<style>

body{
    background:#cfcfcf;
    font-family:Arial;
}

x-equalizer{
    display:block;
    width:fit-content;
    margin:auto;
    margin-top:20px;
}

.equalizer{
    width:580px;
    border:2px solid gray;
    background:#d4d0c8;
    padding:10px;
}

.top{
    margin-bottom:15px;
}

.top h2{
    margin:0;
    font-size:18px;
}

.equalizer-body{
    display:flex;
    justify-content:center;
    gap:8px;
}

.band{
    display:flex;
    flex-direction:column;
    align-items:center;
    border:1px solid gray;
    padding:5px;
    background:#e4e4e4;
}

.band label{
    margin-bottom:8px;
    font-size:12px;
}

.band input[type=range]{
    writing-mode:vertical-lr;
    direction:rtl;
    width:30px;
    height:140px;
}

.valor{
    margin-top:8px;
    font-size:12px;
}

</style>

</head>

<body>

<x-equalizer></x-equalizer>

<script>

class Equalizer extends HTMLElement
{
    constructor()
    {
        super();

        this.data = {

            bandas:[
                { frecuencia:"32Hz", valor:0 },
                { frecuencia:"64Hz", valor:0 },
                { frecuencia:"130Hz", valor:0 },
                { frecuencia:"260Hz", valor:0 },
                { frecuencia:"500Hz", valor:0 },
                { frecuencia:"1k", valor:0 },
                { frecuencia:"2k", valor:0 },
                { frecuencia:"4k", valor:0 },
                { frecuencia:"8.3k", valor:0 },
                { frecuencia:"16.5k", valor:0 }
            ]

        };

        this._onSliderInput = this.actualizarSlider.bind(this);

        this.render();
    }

    connectedCallback()
    {
        let sliders = this.querySelectorAll("input[type=range]");

        for(let i = 0; i < sliders.length; i++)
        {
            sliders[i].addEventListener("input", this._onSliderInput);
        }
    }

    disconnectedCallback()
    {
        let sliders = this.querySelectorAll("input[type=range]");

        for(let i = 0; i < sliders.length; i++)
        {
            sliders[i].removeEventListener("input", this._onSliderInput);
        }
    }

    limpiarNodo(nodo)
    {
        while(nodo.firstChild)
        {
            nodo.removeChild(nodo.firstChild);
        }
    }

    render()
    {
        this.limpiarNodo(this);

        let container = document.createElement("div");

        container.className = "equalizer";

        let top = document.createElement("div");

        top.className = "top";

        let titulo = document.createElement("h2");

        titulo.textContent = "Graphic EQ";

        top.appendChild(titulo);

        container.appendChild(top);

        let body = document.createElement("div");

        body.className = "equalizer-body";

        for(let i = 0; i < this.data.bandas.length; i++)
        {
            let banda = this.data.bandas[i];

            let divBand = document.createElement("div");

            divBand.className = "band";

            let label = document.createElement("label");

            label.textContent = banda.frecuencia;

            divBand.appendChild(label);

            let slider = document.createElement("input");

            slider.type = "range";

            slider.min = "-10";

            slider.max = "10";

            slider.value = banda.valor;

            slider.dataset.index = i;

            divBand.appendChild(slider);

            let valor = document.createElement("div");

            valor.className = "valor";

            valor.textContent = banda.valor + " dB";

            divBand.appendChild(valor);

            body.appendChild(divBand);
        }

        container.appendChild(body);

        this.appendChild(container);
    }

    actualizarSlider(evento)
    {
        let slider = evento.target;

        let index = slider.dataset.index;

        this.data.bandas[index].valor = slider.value;

        let valorTexto =
        slider.parentElement.querySelector(".valor");

        valorTexto.textContent =
        slider.value + " dB";
    }

    getData()
    {
        return this.data;
    }

    setData(data)
    {
        this.data = data;

        this.render();

        let sliders = this.querySelectorAll("input[type=range]");

        for(let i = 0; i < sliders.length; i++)
        {
            sliders[i].addEventListener("input", this._onSliderInput);
        }
    }
}

customElements.define("x-equalizer", Equalizer);

</script>

</body>

</html>
