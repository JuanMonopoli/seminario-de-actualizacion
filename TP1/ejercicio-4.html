<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Chat WebComponent</title>

    <style>

        body{
            background:#ece5dd;
            font-family:Arial;
            margin:0;
            padding:20px;

            display:flex;
            justify-content:center;
        }

        .chat-container{
            width:400px;
            height:600px;

            background:white;

            border-radius:10px;

            box-shadow:0px 0px 10px rgba(0,0,0,0.3);

            display:flex;
            flex-direction:column;

            overflow:hidden;
        }

        .chat-header{
            background:#075e54;

            color:white;

            padding:15px;

            font-size:20px;

            font-weight:bold;
        }

        .chat-messages{
            flex:1;

            padding:10px;

            overflow-y:auto;

            background:#e5ddd5;

            display:flex;

            flex-direction:column;
        }

        .message{
            max-width:70%;

            padding:10px;

            margin-bottom:10px;

            border-radius:10px;

            word-wrap:break-word;
        }

        .received{
            background:white;

            align-self:flex-start;
        }

        .sent{
            background:#dcf8c6;

            align-self:flex-end;
        }

        .chat-input{
            display:flex;

            padding:10px;

            background:#f0f0f0;
        }

        .chat-input input{
            flex:1;

            padding:10px;

            border:none;

            border-radius:5px;

            outline:none;
        }

        .chat-input button{
            margin-left:10px;

            padding:10px 15px;

            border:none;

            background:#075e54;

            color:white;

            border-radius:5px;

            cursor:pointer;
        }

    </style>

</head>

<body>

</body>

<script>

class ChatComponent extends HTMLElement
{
    constructor()
    {
        super();

        this.messages = [];

        this.container = document.createElement('div');

        this.container.className = 'chat-container';

        this.header = document.createElement('div');

        this.header.className = 'chat-header';

        this.header.innerText = 'Chat';

        this.chatMessages = document.createElement('div');

        this.chatMessages.className = 'chat-messages';

        this.inputContainer = document.createElement('div');

        this.inputContainer.className = 'chat-input';

        this.input = document.createElement('input');

        this.input.placeholder = 'Escriba un mensaje...';

        this.button = document.createElement('button');

        this.button.innerText = 'Enviar';

        this.button.onclick = () => {

            if(this.input.value.trim() != "")
            {
                this.addMessage(

                    'Juan',
                    this.input.value,
                    'sent'

                );

                this.input.value = '';
            }

        };

        this.input.addEventListener('keypress', (e) => {

            if(e.key === 'Enter')
            {
                this.button.click();
            }

        });

        this.inputContainer.appendChild(this.input);

        this.inputContainer.appendChild(this.button);

        this.container.appendChild(this.header);

        this.container.appendChild(this.chatMessages);

        this.container.appendChild(this.inputContainer);

        this.appendChild(this.container);
    }

    addMessage(usuario, texto, tipo = 'received')
    {
        this.messages.push({

            usuario: usuario,
            texto: texto,
            tipo: tipo

        });

        let message = document.createElement('div');

        message.className = 'message ' + tipo;

        message.innerHTML = `

            <b>${usuario}</b><br>
            ${texto}

        `;

        this.chatMessages.appendChild(message);

        this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
    }

    insertMessages(mensajes)
    {
        this.clearChat();

        mensajes.forEach(m => {

            this.addMessage(

                m.usuario,
                m.texto,
                m.tipo

            );

        });
    }

    getMessages()
    {
        return this.messages;
    }

    clearChat()
    {
        this.messages = [];

        this.chatMessages.innerHTML = '';
    }

    connectedCallback()
    {
        console.log('Chat conectado');

        this.insertMessages([

            {
                usuario:'Pedro',
                texto:'Hola Juan',
                tipo:'received'
            },

            {
                usuario:'Juan',
                texto:'Hola Pedro ¿cómo estás?',
                tipo:'sent'
            },

            {
                usuario:'Pedro',
                texto:'Todo bien',
                tipo:'received'
            },

            {
                usuario:'Juan',
                texto:'Genial',
                tipo:'sent'
            }

        ]);
    }

    disconnectedCallback()
    {
        console.log('Chat desconectado');
    }
}

customElements.define('x-chat', ChatComponent);

window.onload = () => {

    let chat = new ChatComponent();

    document.body.appendChild(chat);

};

</script>

</html>
