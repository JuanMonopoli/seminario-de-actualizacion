<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Factura AFIP</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#dcdcdc;
    font-family:Arial;
}

.formulario{
    width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border:2px solid black;
}

h1{
    margin-top:0;
    margin-bottom:20px;
}

.grupo{
    margin-bottom:12px;
}

label{
    display:block;
    font-weight:bold;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}

.fila{
    display:flex;
    gap:15px;
}

.fila .grupo{
    flex:1;
}

button{
    width:100%;
    padding:15px;
    margin-top:20px;
    background:#1d4e89;
    color:white;
    border:none;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#16345c;
}

</style>

</head>

<body>

<x-factura></x-factura>

<script>

class FacturaAFIP extends HTMLElement
{
    constructor()
    {
        super();

        this.factura = {

            razonSocial:"",
            domicilioComercial:"",
            condicionIVA:"",
            cuitEmpresa:"",
            ingresosBrutos:"",
            inicioActividades:"",

            puntoVenta:"",
            comprobanteNro:"",
            fechaEmision:"",
            fechaVencimiento:"",

            clienteCUIT:"",
            clienteNombre:"",
            clienteIVA:"",
            clienteDireccion:"",
            condicionVenta:"",

            codigo:"",
            producto:"",
            cantidad:"",
            unidadMedida:"",
            precioUnitario:"",
            bonificacion:"",
            importeBonificacion:"",
            subtotal:""

        };

        this.container = document.createElement("div");

        this.container.className = "formulario";

        let titulo = document.createElement("h1");

        titulo.innerText = "Formulario Factura AFIP";

        this.container.appendChild(titulo);

        this.inputRazon = this.crearCampo("Razón Social");

        this.inputDomicilio = this.crearCampo("Domicilio Comercial");

        this.inputIVA = this.crearCampo("Condición frente al IVA");

        let filaEmpresa = document.createElement("div");

        filaEmpresa.className = "fila";

        this.container.appendChild(filaEmpresa);

        this.inputCUITEmpresa = this.crearCampoFila("CUIT Empresa", filaEmpresa);

        this.inputIB = this.crearCampoFila("Ingresos Brutos", filaEmpresa);

        this.inputInicio = this.crearCampoFila("Inicio Actividades", filaEmpresa);

        this.inputInicio.type = "date";

        let filaFactura = document.createElement("div");

        filaFactura.className = "fila";

        this.container.appendChild(filaFactura);

        this.inputPV = this.crearCampoFila("Punto de Venta", filaFactura);

        this.inputComp = this.crearCampoFila("Comp. Nro", filaFactura);

        this.inputFecha = this.crearCampoFila("Fecha Emisión", filaFactura);

        this.inputFecha.type = "date";

        this.inputVencimiento = this.crearCampoFila("Fecha Vto Pago", filaFactura);

        this.inputVencimiento.type = "date";

        this.inputClienteCUIT = this.crearCampo("CUIT Cliente");

        this.inputClienteNombre = this.crearCampo("Apellido y Nombre / Razón Social");

        this.inputClienteIVA = this.crearCampo("Condición IVA Cliente");

        this.inputClienteDireccion = this.crearCampo("Domicilio Cliente");

        this.inputCondicionVenta = this.crearCampo("Condición de Venta");

        let filaProducto = document.createElement("div");

        filaProducto.className = "fila";

        this.container.appendChild(filaProducto);

        this.inputCodigo = this.crearCampoFila("Código", filaProducto);

        this.inputProducto = this.crearCampoFila("Producto / Servicio", filaProducto);

        this.inputCantidad = this.crearCampoFila("Cantidad", filaProducto);

        let filaProducto2 = document.createElement("div");

        filaProducto2.className = "fila";

        this.container.appendChild(filaProducto2);

        this.inputUnidad = this.crearCampoFila("Unidad Medida", filaProducto2);

        this.inputPrecio = this.crearCampoFila("Precio Unitario", filaProducto2);

        this.inputPrecio.type = "number";

        this.inputBonif = this.crearCampoFila("% Bonif", filaProducto2);

        this.inputBonif.type = "number";

        this.inputImpBonif = this.crearCampoFila("Imp. Bonif", filaProducto2);

        this.inputImpBonif.type = "number";

        let boton = document.createElement("button");

        boton.innerText = "Generar factura";

        boton.onclick = () => {

            this.actualizarDatos();

            this.generarFactura();

        };

        this.container.appendChild(boton);

        this.appendChild(this.container);
    }

    crearCampo(texto)
    {
        let grupo = document.createElement("div");

        grupo.className = "grupo";

        let label = document.createElement("label");

        label.innerText = texto;

        let input = document.createElement("input");

        grupo.appendChild(label);

        grupo.appendChild(input);

        this.container.appendChild(grupo);

        return input;
    }

    crearCampoFila(texto, fila)
    {
        let grupo = document.createElement("div");

        grupo.className = "grupo";

        let label = document.createElement("label");

        label.innerText = texto;

        let input = document.createElement("input");

        grupo.appendChild(label);

        grupo.appendChild(input);

        fila.appendChild(grupo);

        return input;
    }

    actualizarDatos()
    {
        this.factura.razonSocial = this.inputRazon.value;

        this.factura.domicilioComercial = this.inputDomicilio.value;

        this.factura.condicionIVA = this.inputIVA.value;

        this.factura.cuitEmpresa = this.inputCUITEmpresa.value;

        this.factura.ingresosBrutos = this.inputIB.value;

        this.factura.inicioActividades = this.inputInicio.value;

        this.factura.puntoVenta = this.inputPV.value;

        this.factura.comprobanteNro = this.inputComp.value;

        this.factura.fechaEmision = this.inputFecha.value;

        this.factura.fechaVencimiento = this.inputVencimiento.value;

        this.factura.clienteCUIT = this.inputClienteCUIT.value;

        this.factura.clienteNombre = this.inputClienteNombre.value;

        this.factura.clienteIVA = this.inputClienteIVA.value;

        this.factura.clienteDireccion = this.inputClienteDireccion.value;

        this.factura.condicionVenta = this.inputCondicionVenta.value;

        this.factura.codigo = this.inputCodigo.value;

        this.factura.producto = this.inputProducto.value;

        this.factura.cantidad = this.inputCantidad.value;

        this.factura.unidadMedida = this.inputUnidad.value;

        this.factura.precioUnitario = parseFloat(this.inputPrecio.value) || 0;

        this.factura.bonificacion = this.inputBonif.value;

        this.factura.importeBonificacion = parseFloat(this.inputImpBonif.value) || 0;

        this.factura.subtotal =
        (this.factura.precioUnitario * this.factura.cantidad)
        - this.factura.importeBonificacion;
    }

    getData()
    {
        return this.factura;
    }

    setData(data)
    {
        this.factura = data;
    }

    generarFactura()
    {
        let total = this.factura.subtotal;

        let ventana = window.open("", "_blank");

        ventana.document.write(`

        <!DOCTYPE html>

        <html lang="es">

        <head>

        <meta charset="UTF-8">

        <title>Factura AFIP</title>

        <style>

        body{
            font-family:Arial;
            background:white;
            padding:10px;
        }

        .factura{
            width:1100px;
            margin:auto;
            border:2px solid black;
        }

        .top{
            display:flex;
            border-bottom:2px solid black;
        }

        .empresa{
            width:50%;
            padding:15px;
            border-right:2px solid black;
        }

        .facturaInfo{
            width:50%;
            padding:15px;
        }

        .letra{
            width:70px;
            height:70px;
            border:2px solid black;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:45px;
            font-weight:bold;

            margin:auto;
            margin-bottom:15px;
        }

        .tituloFactura{
            text-align:center;
            margin-bottom:20px;
        }

        .datos{
            padding:10px;
            border-bottom:2px solid black;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            border:1px solid black;
            padding:8px;
            font-size:13px;
        }

        .totales{
            width:300px;
            margin-left:auto;
            margin-top:20px;
            margin-right:20px;
        }

        .totales div{
            display:flex;
            justify-content:space-between;
            margin-bottom:10px;
        }

        .footer{
            margin-top:50px;
            padding:20px;
            border-top:2px solid black;
            display:flex;
            justify-content:space-between;
        }

        </style>

        </head>

        <body>

        <div class="factura">

            <div class="top">

                <div class="empresa">

                    <p><b>Razón Social:</b> ${this.factura.razonSocial}</p>

                    <p><b>Domicilio Comercial:</b> ${this.factura.domicilioComercial}</p>

                    <p><b>Condición frente al IVA:</b> ${this.factura.condicionIVA}</p>

                </div>

                <div class="facturaInfo">

                    <div class="letra">

                        B

                    </div>

                    <h1 class="tituloFactura">

                        FACTURA

                    </h1>

                    <p><b>Punto de Venta:</b> ${this.factura.puntoVenta}</p>

                    <p><b>Comp. Nro:</b> ${this.factura.comprobanteNro}</p>

                    <p><b>Fecha Emisión:</b> ${this.factura.fechaEmision}</p>

                    <p><b>CUIT:</b> ${this.factura.cuitEmpresa}</p>

                    <p><b>Ingresos Brutos:</b> ${this.factura.ingresosBrutos}</p>

                    <p><b>Fecha Inicio Actividades:</b> ${this.factura.inicioActividades}</p>

                </div>

            </div>

            <div class="datos">

                <p><b>CUIT:</b> ${this.factura.clienteCUIT}</p>

                <p><b>Apellido y Nombre / Razón Social:</b> ${this.factura.clienteNombre}</p>

                <p><b>Condición frente al IVA:</b> ${this.factura.clienteIVA}</p>

                <p><b>Domicilio:</b> ${this.factura.clienteDireccion}</p>

                <p><b>Condición de venta:</b> ${this.factura.condicionVenta}</p>

                <p><b>Fecha Vto. pago:</b> ${this.factura.fechaVencimiento}</p>

            </div>

            <table>

                <tr>

                    <th>Código</th>

                    <th>Producto / Servicio</th>

                    <th>Cantidad</th>

                    <th>U. Medida</th>

                    <th>Precio Unit.</th>

                    <th>% Bonif</th>

                    <th>Imp. Bonif.</th>

                    <th>Subtotal</th>

                </tr>

                <tr>

                    <td>${this.factura.codigo}</td>

                    <td>${this.factura.producto}</td>

                    <td>${this.factura.cantidad}</td>

                    <td>${this.factura.unidadMedida}</td>

                    <td>$${this.factura.precioUnitario}</td>

                    <td>${this.factura.bonificacion}</td>

                    <td>$${this.factura.importeBonificacion}</td>

                    <td>$${this.factura.subtotal.toFixed(2)}</td>

                </tr>

            </table>

            <div class="totales">

                <div>

                    <span>Subtotal:</span>

                    <span>$${this.factura.subtotal.toFixed(2)}</span>

                </div>

                <div>

                    <span>Importe Otros Tributos:</span>

                    <span>$0.00</span>

                </div>

                <div>

                    <b>Importe Total:</b>

                    <b>$${total.toFixed(2)}</b>

                </div>

            </div>

            <div class="footer">

                <div>

                    Comprobante Autorizado

                </div>

                <div>

                    CAE N°: 06304278833647

                </div>

                <div>

                    Fecha Vto. CAE: 08/08/2016

                </div>

            </div>

        </div>

        </body>

        </html>

        `);

        ventana.document.close();
    }
}

customElements.define("x-factura", FacturaAFIP);

</script>

</body>

</html>
